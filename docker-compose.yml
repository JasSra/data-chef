# dataChef — zero-config start
#
#   docker compose up --build
#
# App opens at http://localhost:3333
# Workspace state is persisted under /app/.datachef inside the container.
#
# Optional: copy .env.example → .env and fill in Azure observability credentials
# to enable App Insights (API key) or Azure Monitor (OAuth) connectors. The file is intentionally absent so the app
# starts cleanly without it.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Optional build args (passed through to Next.js build time if needed)
      # args:
      #   SOME_PUBLIC_VAR: value
    image: datachef:latest
    container_name: datachef
    restart: unless-stopped
    # Use host network to access services on the host machine (Linux only)
    # Comment this out if using host.docker.internal on Windows/Mac
    # network_mode: "host"
    ports:
      - "3333:3000"
    volumes:
      - datachef-data:/app/.datachef
    environment:
      NODE_ENV: production
      # ── Docker Host Access ──
      # Set this to reach SQL Server or other services on the host machine:
      MSSQL_DEFAULT_HOST: host.docker.internal
      # Or use your host IP directly (more reliable on Linux):
      # MSSQL_DEFAULT_HOST: 192.168.4.102
      # ── Optional: Azure observability connectors ──
      # Uncomment and fill in to pre-seed App Insights (API key) or Azure Monitor (OAuth) connectors on startup.
      # These are only used at runtime; they never appear in the built image.
      # APPINSIGHTS_API_KEY: ""
      # APPINSIGHTS_APP_ID: ""         # App Insights Application ID for API-key queries
      # APPINSIGHTS_TENANT_ID: ""
      # APPINSIGHTS_CLIENT_ID: ""
      # APPINSIGHTS_CLIENT_SECRET: ""
      # APPINSIGHTS_WORKSPACE_ID: ""   # for Azure Monitor (recommended)
    # env_file:
    #   - .env          # uncomment after: cp .env.example .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/datasets"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    user: "1001:1001"

volumes:
  datachef-data:
